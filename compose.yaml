services:
  db:
    image: "wodby/mariadb:${MARIADB_TAG}"
    stop_grace_period: 30s
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: "${X_DB_DATABASE}"
      MYSQL_USER: "${X_DB_USERNAME}"
      MYSQL_PASSWORD: "${X_DB_PASSWORD}"
    volumes:
      - ./docker/data/mariadb:/var/lib/mysql

  app:
    image: "wodby/php:${PHP_TAG}"
    depends_on:
      - db
    env_file:
      - .env
      - env/php.env
    volumes:
      - ./docker/conf/php/bashrc:/home/wodby/.bashrc
      - ./src:/var/www/html:cached
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cron:
    image: "wodby/php:${PHP_TAG}"
    depends_on:
      - app
    env_file:
      - .env
      - env/php.env
    volumes:
      - ./src:/var/www/html:cached
      - ./docker/conf/cron/crontab:/etc/crontabs/www-data
    init: true
    command: sudo -E crond -f -d 0
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    image: "wodby/php:${PHP_TAG}"
    scale: 1
    depends_on:
      - app
    env_file:
      - .env
      - env/php.env
    volumes:
      - ./src:/var/www/html:cached
    init: true
    command: php artisan queue:listen -v
    extra_hosts:
      - "host.docker.internal:host-gateway"

  node:
    image: "wodby/node:${NODE_TAG}"
    container_name: "${PROJECT_NAME}-node"
    environment:
      APP_URL: "${X_APP_URL}"
    volumes:
      - ./src:/usr/src/app:cached
    command: sh -c 'npm install && npm run dev'

  web:
    image: "wodby/nginx:${NGINX_TAG}"
    depends_on:
      - app
    environment:
      NGINX_STATIC_OPEN_FILE_CACHE: "off"
      NGINX_BACKEND_HOST: ${COMPOSE_PROJECT_NAME}-app-1
      NGINX_VHOST_PRESET: laravel
      NGINX_SERVER_ROOT: /var/www/html/public
    volumes:
      - ./src:/var/www/html:cached

  redis:
    image: "redis:${REDIS_TAG}"

  pma:
    image: phpmyadmin/phpmyadmin
    depends_on:
      - db
    environment:
      PMA_HOST: "${X_DB_HOST}"
      PHP_UPLOAD_MAX_FILESIZE: 1G
      PHP_MAX_INPUT_VARS: 1G
